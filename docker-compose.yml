services:
  sgi-diseno-desarrollo:
    build: .
    container_name: sgi-diseno-desarrollo
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      JWT_SECRET: change-this-secret-in-production
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./apps/backend/data:/app/apps/backend/data
      - ./apps/backend/uploads:/app/apps/backend/uploads
